<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA ERP Gráfico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="telaLogin" class="login-container">
        <div class="login-box">
            <h2>GVA Sistema</h2>
            <p>Acesso Restrito</p>
            <input type="email" id="email" placeholder="Seu e-mail">
            <input type="password" id="senha" placeholder="Sua senha">
            <button onclick="entrar()">Entrar</button>
            <p id="msgErro" style="color: red; font-size: 14px; display: none;">Login inválido!</p>
        </div>
    </div>

    <div id="appInterface" class="app-container" style="display: none;">
        
        <aside class="sidebar">
            <div class="sidebar-header">GVA ERP</div>
            <nav class="menu">
                <button onclick="mudarAba('loja')" class="ativo"><i class="fa fa-store"></i> Loja</button>
                <button onclick="mudarAba('producao')"><i class="fa fa-tasks"></i> Produção</button>
                <button onclick="mudarAba('financeiro')"><i class="fa fa-chart-line"></i> Financeiro</button>
                <button onclick="mudarAba('cadastros')"><i class="fa fa-database"></i> Cadastros</button>
            </nav>
            <button onclick="sair()" class="btn-sair"><i class="fa fa-sign-out-alt"></i> Sair</button>
        </aside>

        <main class="main-content">
            <section id="aba-loja" class="aba ativa"><h2>Vitrine da Loja (Em breve)</h2></section>
            <section id="aba-producao" class="aba"><h2>Painel de Produção (Em breve)</h2></section>
            <section id="aba-financeiro" class="aba"><h2>Financeiro (Em breve)</h2></section>
            
            <section id="aba-cadastros" class="aba">
                <div class="sub-menu">
                    <button onclick="mudarSubAba('sub-cat')" class="sub-ativo" id="btn-sub-cat">Categorias</button>
                    <button onclick="mudarSubAba('sub-prod')" id="btn-sub-prod">Produtos Base</button>
                    <button onclick="mudarSubAba('sub-acab')" id="btn-sub-acab">Grade de Acabamentos</button>
                </div>

                <div id="sub-cat" class="sub-aba sub-ativa">
                    <div class="card">
                        <h3>Nova Categoria</h3>
                        <div class="form-linha">
                            <input type="hidden" id="catId">
                            <input type="text" id="catNome" placeholder="Ex: Comunicação Visual">
                            <button class="btn-salvar" onclick="salvarCategoria()">Salvar</button>
                        </div>
                    </div>
                    <div class="card">
                        <table class="tabela-erp">
                            <thead><tr><th>Categoria</th><th style="text-align:right;">Ação</th></tr></thead>
                            <tbody id="listaCategorias"></tbody>
                        </table>
                    </div>
                </div>

                <div id="sub-prod" class="sub-aba">
                    <div class="card">
                        <h3>Novo Produto Base (Casca)</h3>
                        <div class="form-grid">
                            <input type="hidden" id="prodId">
                            <div class="input-group"><label>Nome (Ex: Banner Lona Fosca)</label><input type="text" id="prodNome"></div>
                            <div class="input-group"><label>Categoria</label><select id="prodCategoria"></select></div>
                            <div class="input-group"><label>Como cobra?</label>
                                <select id="prodRegra" onchange="toggleLimites()">
                                    <option value="m2">Comunicação Visual (Metro Quadrado - m²)</option>
                                    <option value="unidade">Unidade Fechada (Cartões, Canecas)</option>
                                </select>
                            </div>
                            <div class="input-group"><label>Preço Base (R$ por m² ou un)</label><input type="number" id="prodPreco" value="0.00" step="0.01"></div>
                        </div>
                        
                        <div id="divLimitesPlotter" class="form-grid" style="background:#EBF4FF; padding:15px; border-radius:8px; margin-top:15px; border:1px solid #BEE3F8;">
                            <div class="input-group"><label style="color:#2B6CB0;">Largura Máx da Bobina (m) [Ex: 1.50]</label><input type="number" id="prodLargMax" value="1.50" step="0.01"></div>
                            <div class="input-group"><label style="color:#2B6CB0;">Comprimento Máx (m) [Ex: 100.00]</label><input type="number" id="prodCompMax" value="100.00" step="0.01"></div>
                        </div>

                        <br>
                        <button class="btn-salvar" onclick="salvarProduto()">Salvar Produto</button>
                        <button class="btn-limpar" onclick="limparFormProduto()">Limpar</button>
                    </div>
                    <div class="card">
                        <table class="tabela-erp">
                            <thead><tr><th>Produto</th><th>Regra</th><th>Preço</th><th style="text-align:right;">Ações</th></tr></thead>
                            <tbody id="listaProdutos"></tbody>
                        </table>
                    </div>
                </div>

                <div id="sub-acab" class="sub-aba">
                    <div class="card">
                        <h3>Novo Acabamento</h3>
                        <div class="form-grid">
                            <input type="hidden" id="acabId">
                            <div class="input-group"><label>Nome (Ex: Ilhós Metálico / Madeira)</label><input type="text" id="acabNome"></div>
                            <div class="input-group"><label>Grupo no Menu (Ex: Acabamento)</label><input type="text" id="acabGrupo" placeholder="Vazio = Checkbox solto"></div>
                            <div class="input-group"><label>Aparece em qual categoria?</label><select id="acabCategoria"></select></div>
                            <div class="input-group"><label>Lógica Matemática</label>
                                <select id="acabRegra">
                                    <option value="cobrar_area_m2">Multiplicar por Metro Quadrado (m²)</option>
                                    <option value="unidade_simples">Fixo por Unidade (Ex: Madeirinha inteira)</option>
                                </select>
                            </div>
                        </div>
                        
                        <div class="form-grid" style="margin-top:15px;">
                            <div class="input-group"><label style="color:#38A169;">Preço de Venda (R$)</label><input type="number" id="acabPrecoVenda" value="0.00" step="0.01"></div>
                            <div class="input-group"><label style="color:#E53E3E;">Preço de Custo (R$)</label><input type="number" id="acabCusto" value="0.00" step="0.01"></div>
                        </div>
                        <br>
                        <button class="btn-salvar" onclick="salvarAcabamento()">Salvar Acabamento</button>
                        <button class="btn-limpar" onclick="limparFormAcabamento()">Limpar</button>
                    </div>
                    <div class="card">
                        <table class="tabela-erp">
                            <thead><tr><th>Vínculo</th><th>Acabamento</th><th>Preço Venda</th><th>Regra</th><th style="text-align:right;">Ações</th></tr></thead>
                            <tbody id="listaAcabamentos"></tbody>
                        </table>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
