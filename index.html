<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA Gráfica ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .active-aba { background-color: #F5F7FF; color: #4F46E5; border-right: 4px solid #4F46E5; }
        .active-sub { color: #4F46E5; border-bottom: 2px solid #4F46E5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-700 font-sans">

    <!-- LOGIN -->
    <div id="telaLogin" class="min-h-screen flex items-center justify-center bg-indigo-950 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-3xl font-extrabold text-indigo-950 mb-8 italic tracking-tight">GVA Sistema</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <input type="password" id="senha" placeholder="Senha" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                <button onclick="entrar()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200">Acessar Painel</button>
            </div>
        </div>
    </div>

    <!-- INTERFACE -->
    <div id="appInterface" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col sticky top-0 h-screen z-20">
            <div class="p-8"><span class="text-2xl font-black text-indigo-900 italic uppercase tracking-tighter">GVA Gráfica</span></div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="mudarAba('loja', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 active-aba"><i class="fa fa-shopping-bag"></i> Loja PDV</button>
                <button onclick="mudarAba('producao', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition"><i class="fa fa-tasks"></i> Produção</button>
                <button onclick="mudarAba('financeiro', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition"><i class="fa fa-chart-pie"></i> Financeiro</button>
                <button onclick="mudarAba('cadastros', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition"><i class="fa fa-layer-group"></i> Cadastros</button>
            </nav>
            <div class="p-6 border-t border-slate-100"><button onclick="sair()" class="w-full text-red-500 font-bold py-3 hover:bg-red-50 rounded-xl transition text-sm">Sair do Sistema</button></div>
        </aside>

        <!-- CONTEUDO -->
        <main class="flex-1 p-8 lg:p-12 overflow-y-auto">

            <!-- LOJA PDV -->
            <section id="aba-loja" class="aba-content block">
                <div class="flex flex-col lg:flex-row gap-10">
                    <div class="flex-1">
                        <div id="menuFiltroCat" class="flex gap-3 mb-8 overflow-x-auto pb-2 no-scrollbar"></div>
                        <div id="gradeProdutos" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
                    </div>

                    <div class="w-full lg:w-[380px] bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl h-fit sticky top-8">
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fa fa-shopping-cart text-indigo-500"></i> Carrinho</h3>
                        <div id="listaCarrinho" class="space-y-4 mb-8 max-h-80 overflow-y-auto pr-2"></div>
                        
                        <div class="border-t border-slate-100 pt-6 space-y-4">
                            <div class="grid grid-cols-2 gap-2">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Pagamento</label>
                                    <select id="cartPagamento" onchange="toggleOpcoesPagamento()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                        <option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Debito">Débito</option>
                                        <option value="Credito_Vista">Crédito à Vista</option><option value="Credito_Parcelado">Crédito Parcelado</option>
                                    </select>
                                </div>
                                <div class="space-y-1" id="divParcelas" style="display:none;">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Parcelas</label>
                                    <select id="cartParcelas" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                        <option value="2">2x</option><option value="3">3x</option><option value="4">4x</option><option value="6">6x</option><option value="12">12x</option>
                                    </select>
                                </div>
                            </div>

                            <div class="grid grid-cols-2 gap-2">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Entrega</label>
                                    <select id="cartEntrega" onchange="toggleOpcoesEntrega()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                        <option value="Retirada">Retirada</option><option value="Motoboy">Motoboy</option><option value="Transportadora">Transp.</option>
                                    </select>
                                </div>
                                <div class="space-y-1" id="divFrete" style="display:none;">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Frete R$</label>
                                    <input type="number" id="cartFreteValor" value="0" oninput="atualizarTotalFinal()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                </div>
                            </div>
                            
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase flex justify-between">Cliente <span id="labelCreditoCli" class="text-emerald-500">Saldo: R$ 0.00</span></label>
                                <select id="cartCliente" onchange="atualizarInfoCreditoCarrinho()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none"></select>
                            </div>

                            <div class="pt-4 border-t border-dashed border-slate-200">
                                <div class="flex justify-between text-slate-400 font-medium text-sm"><span>Subtotal:</span><span id="subtotalCart">R$ 0.00</span></div>
                                <div class="flex justify-between text-2xl font-black text-indigo-950 mt-1"><span>Total:</span><span id="totalCarrinho">R$ 0.00</span></div>
                            </div>
                        </div>
                        <button onclick="enviarPedido()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-bold text-lg mt-8 hover:bg-emerald-600 transition">Finalizar Pedido</button>
                    </div>
                </div>
            </section>

            <!-- CADASTROS -->
            <section id="aba-cadastros" class="aba-content hidden">
                <div class="flex gap-8 border-b border-slate-200 mb-10 overflow-x-auto no-scrollbar">
                    <button onclick="mudarSubAba('sub-cli', this)" class="sub-aba-btn pb-4 font-bold text-slate-400 active-sub">Clientes</button>
                    <button onclick="mudarSubAba('sub-prod', this)" class="sub-aba-btn pb-4 font-bold text-slate-400">Produtos</button>
                    <button onclick="mudarSubAba('sub-cat', this)" class="sub-aba-btn pb-4 font-bold text-slate-400">Categorias</button>
                </div>

                <!-- Clientes -->
                <div id="sub-cli" class="sub-aba-content block animate-fadeIn">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm mb-10">
                        <h3 id="tituloCliForm" class="font-bold text-slate-800 mb-6 uppercase text-sm tracking-widest">Novo Cliente</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                            <input type="hidden" id="cliId">
                            <div class="space-y-1 col-span-1 lg:col-span-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Nome</label><input type="text" id="cliNome" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">CPF/CNPJ</label><input type="text" id="cliDoc" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">WhatsApp</label><input type="text" id="cliTel" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Endereço</label><input type="text" id="cliEnd" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase text-emerald-600">Crédito R$</label><input type="number" id="cliCredito" value="0" step="0.01" class="w-full p-3 bg-emerald-50 rounded-xl border border-emerald-100 font-bold text-emerald-700 outline-none"></div>
                        </div>
                        <div class="flex gap-3">
                            <button id="btnSalvarCli" onclick="salvarCliente()" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Salvar Cliente</button>
                            <button id="btnCancelarCli" onclick="limparFormCli()" class="hidden bg-slate-100 text-slate-500 px-6 py-3 rounded-xl font-bold">Cancelar</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-bold uppercase text-slate-400"><tr><th class="p-5">Nome</th><th class="p-5">Crédito</th><th class="p-5 text-center">Ações</th></tr></thead>
                            <tbody id="listaClientesTab" class="text-sm font-medium text-slate-600"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Categorias -->
                <div id="sub-cat" class="sub-aba-content hidden animate-fadeIn">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm max-w-md">
                        <h3 id="tituloCatForm" class="font-bold text-slate-800 mb-4 uppercase text-xs">Gerenciar Categoria</h3>
                        <div class="flex gap-2">
                            <input type="hidden" id="catId">
                            <input type="text" id="catNome" class="flex-1 p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none font-bold" placeholder="Nome">
                            <button id="btnSalvarCat" onclick="salvarCategoria()" class="bg-indigo-600 text-white px-6 rounded-xl font-bold hover:bg-indigo-700 transition">Salvar</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm max-w-md mt-6 overflow-hidden">
                        <table class="w-full text-left text-sm font-bold text-slate-600"><tbody id="listaCategoriasTab"></tbody></table>
                    </div>
                </div>
                
                <!-- Produtos (Mantido visual anterior) -->
                <div id="sub-prod" class="sub-aba-content hidden animate-fadeIn">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm mb-10">
                        <h3 class="font-bold text-slate-800 mb-6 uppercase text-sm tracking-widest italic">Configurar Produto</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <input type="hidden" id="prodId">
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Nome</label><input type="text" id="prodNome" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Categoria</label><select id="prodCategoria" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></select></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase text-indigo-600">Preço Base R$</label><input type="number" id="prodPreco" class="w-full p-3 bg-indigo-50 rounded-xl border border-indigo-100 outline-none font-bold"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase">Imagem (URL)</label><input type="text" id="prodFoto" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                        </div>
                        <div class="bg-slate-50 p-6 rounded-2xl border border-slate-100 mb-8">
                            <h4 class="font-bold text-slate-400 mb-4 text-[10px] uppercase tracking-widest">Variações e Adicionais</h4>
                            <div id="listaAtributos" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                            <button onclick="addAtributo()" class="mt-6 bg-white text-indigo-600 border border-slate-200 px-5 py-2 rounded-xl text-xs font-bold hover:bg-indigo-600 hover:text-white transition">+ Novo Grupo de Atributos</button>
                        </div>
                        <button onclick="salvarProduto()" class="bg-indigo-600 text-white px-12 py-4 rounded-2xl font-bold shadow-lg hover:bg-indigo-700 transition">Salvar Produto</button>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left text-sm font-bold text-slate-600">
                            <thead class="bg-slate-50 text-[10px] font-bold uppercase text-slate-400 tracking-wider"><tr><th class="p-5">Produto</th><th class="p-5">Categoria</th><th class="p-5 text-center">Ações</th></tr></thead>
                            <tbody id="listaProdutosTab"></tbody>
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL PDV -->
    <div id="modalW2P" class="fixed inset-0 bg-slate-900/60 hidden z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-3xl max-h-[90vh] rounded-[40px] overflow-hidden flex flex-col shadow-2xl scale-95">
            <div id="modalHeaderImg" class="h-64 bg-slate-100 bg-contain bg-no-repeat bg-center p-6 relative">
                <button onclick="fecharModal()" class="absolute top-6 right-6 bg-white w-12 h-12 rounded-full font-bold shadow-xl flex items-center justify-center hover:bg-slate-50 transition">✕</button>
            </div>
            <div class="p-10 flex-1 overflow-y-auto">
                <h2 id="modalNomeProd" class="text-3xl font-black text-slate-900 mb-8 italic uppercase tracking-tight"></h2>
                <input type="hidden" id="modalProdId"><input type="hidden" id="modalProdPrecoBase">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    <div class="space-y-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Quantidade</label>
                        <input type="number" id="w2pQtd" value="1" min="1" oninput="calcularPrecoAoVivo()" class="w-full p-5 border border-slate-200 rounded-[24px] text-3xl font-black bg-slate-50 focus:bg-white focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                    </div>
                    <div id="modalCorpoVariacoes" class="col-span-1 md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 pt-8 border-t border-slate-100"></div>
                </div>
            </div>
            <div class="p-10 border-t border-slate-100 flex flex-col md:flex-row justify-between items-center bg-slate-50 gap-6">
                <div>
                    <p class="text-[10px] font-bold text-slate-400 uppercase">Investimento</p>
                    <p id="modalSubtotal" class="text-4xl font-black text-indigo-600">R$ 0.00</p>
                </div>
                <button onclick="confirmarAdicaoCarrinho()" class="w-full md:w-auto bg-indigo-600 text-white px-14 py-5 rounded-3xl font-bold text-xl shadow-2xl hover:scale-[1.02] active:scale-95 transition-all">Adicionar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
