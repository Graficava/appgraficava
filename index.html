<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA Gráfica ERP</title>
    <!-- Tailwind CSS para evitar erros de arquivo CSS externo -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <!-- TELA DE LOGIN -->
    <div id="telaLogin" class="min-h-screen flex items-center justify-center bg-indigo-900 px-4">
        <div class="bg-white p-8 rounded-xl shadow-2xl w-full max-w-sm">
            <h2 class="text-2xl font-bold text-center text-indigo-900 mb-6">GVA Sistema</h2>
            <div class="space-y-4">
                <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <input type="password" id="senha" placeholder="Senha" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                <button onclick="entrar()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition">Entrar</button>
                <p id="msgErro" class="text-red-500 text-sm text-center hidden">Usuário ou senha inválidos.</p>
            </div>
        </div>
    </div>

    <!-- APP INTERFACE -->
    <div id="appInterface" class="hidden min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col">
            <div class="p-6 text-center border-b">
                <span class="text-2xl font-black text-indigo-700 italic">GVA Gráfica</span>
            </div>
            <nav class="flex-1 p-4 space-y-2">
                <button onclick="mudarAba('loja')" class="aba-btn w-full flex items-center gap-3 p-3 rounded-lg font-semibold text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition active">
                    <i class="fa fa-store"></i> Loja
                </button>
                <button onclick="mudarAba('producao')" class="aba-btn w-full flex items-center gap-3 p-3 rounded-lg font-semibold text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition">
                    <i class="fa fa-tasks"></i> Produção
                </button>
                <button onclick="mudarAba('financeiro')" class="aba-btn w-full flex items-center gap-3 p-3 rounded-lg font-semibold text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition">
                    <i class="fa fa-chart-line"></i> Financeiro
                </button>
                <button onclick="mudarAba('cadastros')" class="aba-btn w-full flex items-center gap-3 p-3 rounded-lg font-semibold text-gray-600 hover:bg-indigo-50 hover:text-indigo-700 transition">
                    <i class="fa fa-database"></i> Cadastros
                </button>
            </nav>
            <button onclick="sair()" class="p-4 text-red-600 font-bold hover:bg-red-50 transition border-t">Sair</button>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-6 overflow-y-auto">
            
            <!-- ABA LOJA -->
            <section id="aba-loja" class="aba-content block space-y-6">
                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 space-y-6">
                        <div id="menuFiltroCat" class="flex gap-2 overflow-x-auto pb-2">
                            <!-- Categorias aqui -->
                        </div>
                        <div id="gradeProdutos" class="grid grid-cols-2 md:grid-cols-3 gap-4">
                            <!-- Produtos aqui -->
                        </div>
                    </div>
                    <!-- Carrinho Sidebar -->
                    <div class="bg-white p-6 rounded-xl shadow-sm border h-fit sticky top-6">
                        <h3 class="text-lg font-bold border-b pb-3 mb-4"><i class="fa fa-shopping-cart"></i> Carrinho</h3>
                        <div id="listaCarrinho" class="space-y-3 mb-4"></div>
                        <div class="flex justify-between font-bold text-xl mb-6 pt-3 border-t">
                            <span>Total:</span>
                            <span id="totalCarrinho">R$ 0.00</span>
                        </div>
                        <button onclick="enviarPedido()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold shadow-lg hover:bg-green-700 transition">Finalizar Pedido</button>
                    </div>
                </div>
            </section>

            <!-- ABA CADASTROS -->
            <section id="aba-cadastros" class="aba-content hidden space-y-6">
                <div class="flex gap-4 border-b pb-2 mb-4 overflow-x-auto">
                    <button onclick="mudarSubAba('sub-cli')" class="sub-aba-btn font-bold text-indigo-600 border-b-2 border-indigo-600 px-2">Clientes</button>
                    <button onclick="mudarSubAba('sub-prod')" class="sub-aba-btn font-bold text-gray-400 px-2">Produtos</button>
                    <button onclick="mudarSubAba('sub-cat')" class="sub-aba-btn font-bold text-gray-400 px-2">Categorias</button>
                    <button onclick="mudarSubAba('sub-acab')" class="sub-aba-btn font-bold text-gray-400 px-2">Acabamentos</button>
                </div>

                <!-- Sub-aba Produtos -->
                <div id="sub-prod" class="sub-aba-content hidden animate-fadeIn">
                    <div class="bg-white p-6 rounded-xl shadow-sm border">
                        <h3 class="font-bold mb-4">Configurar Novo Produto</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 mb-6">
                            <input type="hidden" id="prodId">
                            <div class="space-y-1">
                                <label class="text-xs font-bold uppercase text-gray-500">Nome</label>
                                <input type="text" id="prodNome" class="w-full p-2 border rounded-lg">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold uppercase text-gray-500">Categoria</label>
                                <select id="prodCategoria" class="w-full p-2 border rounded-lg"></select>
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold uppercase text-gray-500">Preço Base R$</label>
                                <input type="number" id="prodPreco" step="0.01" class="w-full p-2 border rounded-lg">
                            </div>
                            <div class="space-y-1">
                                <label class="text-xs font-bold uppercase text-gray-500">Foto (URL)</label>
                                <input type="text" id="prodFoto" class="w-full p-2 border rounded-lg">
                            </div>
                        </div>

                        <!-- Variações -->
                        <div class="bg-blue-50 p-4 rounded-lg border border-blue-100 mb-6">
                            <h4 class="font-bold text-blue-800 mb-2 underline italic text-sm">ATRIBUTOS (Papel, Cor, Tamanho...)</h4>
                            <div id="listaAtributos" class="space-y-3"></div>
                            <button onclick="addAtributo()" class="mt-3 bg-white text-blue-600 border border-blue-600 px-3 py-1 rounded text-sm font-bold hover:bg-blue-600 hover:text-white transition">+ Novo Atributo</button>
                        </div>

                        <button onclick="salvarProduto()" class="bg-indigo-600 text-white px-8 py-3 rounded-lg font-bold">Salvar Produto</button>
                    </div>
                </div>

                <!-- Lista de Produtos -->
                <div class="bg-white rounded-xl shadow-sm border mt-6 overflow-hidden">
                    <table class="w-full text-left">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="p-4">Produto</th>
                                <th class="p-4 text-center">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="listaProdutos"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- MODAL CONFIGURADOR -->
    <div id="modalW2P" class="fixed inset-0 bg-black/70 hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white w-full max-w-2xl max-h-[90vh] rounded-2xl overflow-hidden flex flex-col relative">
            <button onclick="fecharModal()" class="absolute top-4 right-4 bg-gray-200 w-8 h-8 rounded-full">×</button>
            <div id="modalHeaderImg" class="h-48 bg-gray-100 bg-contain bg-no-repeat bg-center"></div>
            <div class="p-6 flex-1 overflow-y-auto">
                <h2 id="modalNomeProd" class="text-2xl font-bold mb-4"></h2>
                <input type="hidden" id="modalProdId">
                <input type="hidden" id="modalProdPrecoBase">

                <div class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-xs font-bold text-gray-500 uppercase">Quantidade</label>
                            <input type="number" id="w2pQtd" value="1" min="1" oninput="calcularPrecoAoVivo()" class="w-full p-3 border rounded-xl">
                        </div>
                    </div>
                    <div id="modalCorpoVariacoes" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
                </div>
            </div>
            <div class="p-6 border-t flex justify-between items-center bg-gray-50">
                <div>
                    <p class="text-xs font-bold text-gray-400 uppercase">Valor do Item</p>
                    <p id="modalSubtotal" class="text-3xl font-black text-indigo-700">R$ 0.00</p>
                </div>
                <button onclick="confirmarAdicaoCarrinho()" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg shadow-indigo-200">Adicionar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
