<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA Gráfica ERP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>

    <div id="telaLogin" class="login-container">
        <div class="login-box">
            <h2>GVA Balcão</h2>
            <input type="email" id="email" placeholder="E-mail">
            <input type="password" id="senha" placeholder="Senha">
            <button onclick="entrar()">Entrar</button>
        </div>
    </div>

    <div id="appInterface" class="app-container" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-header"><span id="logo-texto">GVA Gráfica</span></div>
            <nav class="menu">
                <button onclick="mudarAba('loja')" class="ativo"><i class="fa fa-store"></i> Loja / Atendimento</button>
                <button onclick="mudarAba('cadastros')" id="menu-cadastros"><i class="fa fa-database"></i> Cadastros (Admin)</button>
                <button onclick="mudarAba('financeiro')" id="menu-financeiro"><i class="fa fa-chart-line"></i> Financeiro</button>
            </nav>
            <button onclick="sair()" class="btn-sair">Sair</button>
        </aside>

        <main class="main-content">
            <section id="aba-loja" class="aba ativa">
                <div class="loja-layout">
                    <div class="loja-vitrine">
                        <div class="filtro-cat" id="menuFiltroCat"></div>
                        <div class="vitrine-grid" id="gradeProdutos"></div>
                    </div>
                    <div class="loja-sidebar">
                        <div class="card">
                            <h3><i class="fa fa-shopping-cart"></i> Carrinho de Venda</h3>
                            <div id="listaCarrinho" class="carrinho-itens"></div>
                            <div class="cart-resumo"><span>Total:</span><b id="totalCarrinho" data-subtotal="0">R$ 0.00</b></div>
                            <div class="input-group"><label>Cliente</label><select id="cartCliente"></select></div>
                            <div class="form-linha">
                                <div class="input-group"><label>Pagamento</label><select id="cartPagamento"><option value="Pix">Pix</option><option value="Dinheiro">Dinheiro</option><option value="Cartao">Cartão</option></select></div>
                            </div>
                            <button class="btn-checkout" onclick="enviarPedido()">Fechar Venda</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="aba-cadastros" class="aba">
                <div class="sub-menu">
                    <button onclick="mudarSubAba('sub-cli')" class="sub-ativo" id="btn-sub-cli">Clientes</button>
                    <button onclick="mudarSubAba('sub-prod')" id="btn-sub-prod">Produtos / Matriz de Preço</button>
                    <button onclick="mudarSubAba('sub-acab')" id="btn-sub-acab">Acabamentos</button>
                </div>

                <div id="sub-cli" class="sub-aba sub-ativa">
                    <div class="card">
                        <h3>Novo Cliente</h3>
                        <div class="form-grid">
                            <input type="hidden" id="cliId">
                            <input type="text" id="cliNome" placeholder="Nome">
                            <input type="text" id="cliDoc" placeholder="CPF/CNPJ">
                            <input type="text" id="cliTel" placeholder="WhatsApp">
                        </div>
                        <button class="btn-salvar" onclick="salvarCliente()">Salvar Cliente</button>
                    </div>
                    <div class="card"><table class="tabela-erp"><thead><tr><th>Nome</th><th>WhatsApp</th><th>Ação</th></tr></thead><tbody id="listaClientes"></tbody></table></div>
                </div>

                <div id="sub-prod" class="sub-aba">
                    <div class="card">
                        <h3>Configuração de Produto</h3>
                        <div class="form-grid">
                            <input type="hidden" id="prodId">
                            <div class="input-group"><label>Tipo de Produto</label><select id="prodTipo" onchange="ajustarCamposProduto()"><option value="grafico">Impressos (Cartão, Panfleto)</option><option value="apostila">Apostila / Impressão Avulsa</option><option value="visual">Comunicação Visual</option></select></div>
                            <div class="input-group"><label>Categoria</label><select id="prodCategoria"></select></div>
                            <input type="text" id="prodNome" placeholder="Nome do Produto">
                        </div>

                        <div id="boxMatrizPreco" class="setup-caixa-pacote" style="margin-top:20px;">
                            <label><i class="fa fa-table"></i> Grade de Preços por Cor e Qtd</label>
                            <div id="listaGradeCores"></div>
                            <button class="btn-add-lista" onclick="addLinhaMatriz()">+ Add Quantidade e Preços</button>
                        </div>

                        <div id="boxProgressivo" style="display:none;" class="setup-caixa-pacote">
                            <label>Preço por Folha (Progressivo)</label>
                            <div id="listaGradeProgressivo"></div>
                            <button class="btn-add-lista" onclick="addLinhaProgressivo()">+ Add Faixa</button>
                        </div>

                        <div class="setup-acabamentos">
                            <label>Acabamentos Permitidos</label>
                            <div id="listaCheckAcabamentos" class="mini-lista-acab"></div>
                        </div>
                        <button class="btn-salvar" onclick="salvarProduto()">Salvar Produto</button>
                    </div>
                    <div class="card"><table class="tabela-erp"><thead><tr><th>Produto</th><th>Ação</th></tr></thead><tbody id="listaProdutos"></tbody></table></div>
                </div>
            </section>
        </main>
    </div>

    <div id="modalW2P" class="modal-fundo" style="display:none;">
        <div class="modal-conteudo">
            <button class="modal-fechar-fixo" onclick="fecharModal()">×</button>
            <div class="modal-corpo">
                <h2 id="modalNomeProd"></h2>
                <div id="modalOpcoesConfig"></div> <div id="modalCorpoAcabamentos" class="config-acab-grid"></div>
            </div>
            <div class="modal-footer-fixo">
                <div class="total-box"><small>TOTAL</small><b id="modalSubtotal">R$ 0.00</b></div>
                <button class="btn-confirmar-cart" onclick="confirmarAdicaoCarrinho()">+ Adicionar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
