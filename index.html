<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA Gráfica ERP</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Firebase Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .active-aba { background-color: #F5F7FF; color: #4F46E5; border-right: 4px solid #4F46E5; }
        .active-sub { color: #4F46E5; border-bottom: 2px solid #4F46E5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .animate-modal { animation: zoom 0.2s ease-out; }
        @keyframes zoom { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-700 font-sans">

    <!-- TELA DE LOGIN -->
    <div id="telaLogin" class="min-h-screen flex items-center justify-center bg-indigo-950 px-4">
        <div class="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-3xl font-extrabold text-indigo-950 mb-8 italic tracking-tight text-center">GVA Sistema</h2>
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">E-mail</label>
                    <input type="email" id="email" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Senha</label>
                    <input type="password" id="senha" class="w-full p-4 border border-slate-200 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                </div>
                <button onclick="entrar()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition shadow-lg shadow-indigo-200 mt-4">Acessar Painel</button>
            </div>
        </div>
    </div>

    <!-- INTERFACE PRINCIPAL -->
    <div id="appInterface" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-64 bg-white border-r border-slate-200 flex flex-col sticky top-0 h-screen z-20">
            <div class="p-8">
                <span class="text-2xl font-black text-indigo-900 italic uppercase tracking-tighter">GVA Gráfica</span>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="mudarAba('loja', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition active-aba">
                    <i class="fa fa-shopping-bag"></i> Loja PDV
                </button>
                <button onclick="mudarAba('producao', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition">
                    <i class="fa fa-tasks"></i> Produção
                </button>
                <button onclick="mudarAba('financeiro', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition">
                    <i class="fa fa-chart-pie"></i> Financeiro
                </button>
                <button onclick="mudarAba('cadastros', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-2xl font-semibold text-slate-500 hover:bg-slate-50 transition">
                    <i class="fa fa-layer-group"></i> Cadastros
                </button>
            </nav>
            <div class="p-6 border-t border-slate-100">
                <button onclick="sair()" class="w-full text-red-500 font-bold py-3 hover:bg-red-50 rounded-xl transition text-sm">Sair do Sistema</button>
            </div>
        </aside>

        <!-- CONTEUDO PRINCIPAL -->
        <main class="flex-1 p-8 lg:p-12 overflow-y-auto">

            <!-- ABA: LOJA -->
            <section id="aba-loja" class="aba-content block">
                <div class="flex flex-col lg:flex-row gap-10">
                    <!-- Vitrine -->
                    <div class="flex-1">
                        <div id="menuFiltroCat" class="flex gap-3 mb-8 overflow-x-auto pb-2 no-scrollbar"></div>
                        <div id="gradeProdutos" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-8"></div>
                    </div>

                    <!-- CARRINHO -->
                    <div class="w-full lg:w-[380px] bg-white p-8 rounded-[32px] border border-slate-100 shadow-xl h-fit sticky top-8">
                        <h3 class="text-xl font-bold mb-6 flex items-center gap-2"><i class="fa fa-shopping-cart text-indigo-500"></i> Carrinho</h3>
                        
                        <div id="listaCarrinho" class="space-y-4 mb-8 max-h-80 overflow-y-auto pr-2"></div>
                        
                        <div class="border-t border-slate-100 pt-6 space-y-4">
                            <!-- Pagamento -->
                            <div class="grid grid-cols-2 gap-2">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Pagamento</label>
                                    <select id="cartPagamento" onchange="toggleOpcoesPagamento()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                        <option value="Pix">Pix</option>
                                        <option value="Dinheiro">Dinheiro</option>
                                        <option value="Debito">Débito</option>
                                        <option value="Credito_Vista">Crédito à Vista</option>
                                        <option value="Credito_Parcelado">Crédito Parcelado</option>
                                    </select>
                                </div>
                                <div class="space-y-1" id="divParcelas" style="display:none;">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Parcelas</label>
                                    <select id="cartParcelas" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                        <option value="2">2x</option><option value="3">3x</option><option value="4">4x</option><option value="6">6x</option><option value="12">12x</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Entrega -->
                            <div class="grid grid-cols-2 gap-2">
                                <div class="space-y-1">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Entrega</label>
                                    <select id="cartEntrega" onchange="toggleOpcoesEntrega()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                        <option value="Retirada">Retirada</option>
                                        <option value="Motoboy">Motoboy</option>
                                        <option value="Transportadora">Transportadora</option>
                                    </select>
                                </div>
                                <div class="space-y-1" id="divFrete" style="display:none;">
                                    <label class="text-[10px] font-bold text-slate-400 uppercase">Valor Frete R$</label>
                                    <input type="number" id="cartFreteValor" value="0" oninput="atualizarTotalFinal()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none">
                                </div>
                            </div>
                            
                            <!-- Cliente & Crédito -->
                            <div class="space-y-1">
                                <label class="text-[10px] font-bold text-slate-400 uppercase flex justify-between">
                                    Cliente <span id="labelCreditoCli" class="text-emerald-500">Saldo: R$ 0.00</span>
                                </label>
                                <select id="cartCliente" onchange="atualizarInfoCreditoCarrinho()" class="w-full p-3 bg-slate-50 border border-slate-100 rounded-xl text-xs font-bold outline-none"></select>
                            </div>

                            <!-- Totais -->
                            <div class="pt-4 border-t border-dashed border-slate-200">
                                <div class="flex justify-between text-slate-400 font-medium text-sm">
                                    <span>Subtotal:</span>
                                    <span id="subtotalCart">R$ 0.00</span>
                                </div>
                                <div class="flex justify-between text-2xl font-black text-indigo-950 mt-1">
                                    <span>Total:</span>
                                    <span id="totalCarrinho">R$ 0.00</span>
                                </div>
                            </div>
                        </div>

                        <button onclick="enviarPedido()" class="w-full bg-emerald-500 text-white py-5 rounded-2xl font-bold text-lg shadow-lg shadow-emerald-100 hover:bg-emerald-600 transition mt-8">Finalizar Pedido</button>
                    </div>
                </div>
            </section>

            <!-- ABA: PRODUÇÃO -->
            <section id="aba-producao" class="aba-content hidden">
                <h2 class="text-2xl font-bold text-indigo-950 mb-6">Pedidos em Produção</h2>
                <div class="bg-white p-12 rounded-3xl border border-slate-100 text-center text-slate-300 font-bold italic">
                    Área em desenvolvimento...
                </div>
            </section>

            <!-- ABA: FINANCEIRO -->
            <section id="aba-financeiro" class="aba-content hidden">
                <h2 class="text-2xl font-bold text-indigo-950 mb-6">Fluxo de Caixa</h2>
                <div class="bg-white p-12 rounded-3xl border border-slate-100 text-center text-slate-300 font-bold italic">
                    Área em desenvolvimento...
                </div>
            </section>

            <!-- ABA: CADASTROS -->
            <section id="aba-cadastros" class="aba-content hidden">
                <div class="flex gap-8 border-b border-slate-200 mb-10 overflow-x-auto no-scrollbar">
                    <button onclick="mudarSubAba('sub-cli', this)" class="sub-aba-btn pb-4 font-bold text-slate-400 active-sub">Clientes</button>
                    <button onclick="mudarSubAba('sub-prod', this)" class="sub-aba-btn pb-4 font-bold text-slate-400">Produtos</button>
                    <button onclick="mudarSubAba('sub-cat', this)" class="sub-aba-btn pb-4 font-bold text-slate-400">Categorias</button>
                </div>

                <!-- Sub-aba Clientes -->
                <div id="sub-cli" class="sub-aba-content block">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm mb-10">
                        <h3 id="tituloCliForm" class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest">Novo Cliente</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-5 gap-4 mb-8">
                            <input type="hidden" id="cliId">
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Nome</label><input type="text" id="cliNome" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">CPF/CNPJ</label><input type="text" id="cliDoc" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">WhatsApp</label><input type="text" id="cliTel" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-slate-400 uppercase ml-1">Endereço</label><input type="text" id="cliEnd" class="w-full p-3 bg-slate-50 rounded-xl border border-slate-100 outline-none"></div>
                            <div class="space-y-1"><label class="text-[10px] font-bold text-emerald-600 uppercase ml-1">Crédito R$</label><input type="number" id="cliCredito" value="0" step="0.01" class="w-full p-3 bg-emerald-50 rounded-xl border border-emerald-100 font-bold text-emerald-700 outline-none"></div>
                        </div>
                        <div class="flex gap-3">
                            <button id="btnSalvarCli" onclick="salvarCliente()" class="bg-indigo-600 text-white px-10 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Salvar Cliente</button>
                            <button id="btnCancelarCli" onclick="limparFormCli()" class="hidden bg-slate-100 text-slate-500 px-6 py-3 rounded-xl font-bold">Cancelar</button>
                        </div>
                    </div>
                    <div class="bg-white rounded-3xl border border-slate-100 shadow-sm overflow-hidden">
                        <table class="w-full text-left">
                            <thead class="bg-slate-50 text-[10px] font-bold uppercase text-slate-400 tracking-wider">
                                <tr><th class="p-5">Nome</th><th class="p-5">Saldo Crédito</th><th class="p-5 text-center">Ações</th></tr>
                            </thead>
                            <tbody id="listaClientesTab" class="text-sm"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Sub-aba Produtos -->
                <div id="sub-prod" class="sub-aba-content hidden">
                    <div class="bg-white p-8 rounded-3xl border border-slate-100 shadow-sm mb-10">
                        <h3 class="font-bold text-slate-800 mb-6 uppercase text-xs tracking-widest">Configurar Produto</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <input type="hidden" id="prodId">
