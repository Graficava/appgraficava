<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GVA Gráfica ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        .active-aba { background-color: #EEF2FF; color: #4338CA; border-right: 4px solid #4338CA; }
        .active-sub { color: #4338CA; border-bottom: 2px solid #4338CA; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <!-- LOGIN -->
    <div id="telaLogin" class="min-h-screen flex items-center justify-center bg-indigo-900 px-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-3xl font-black text-indigo-900 mb-6 italic">GVA Sistema</h2>
            <input type="email" id="email" placeholder="E-mail" class="w-full p-3 border rounded-xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="senha" placeholder="Senha" class="w-full p-3 border rounded-xl mb-6 outline-none focus:ring-2 focus:ring-indigo-500">
            <button onclick="entrar()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl hover:bg-indigo-700 transition shadow-lg">Acessar Painel</button>
            <p id="msgErro" class="text-red-500 mt-4 hidden text-sm font-bold">Login ou Senha incorretos.</p>
        </div>
    </div>

    <!-- INTERFACE -->
    <div id="appInterface" class="hidden min-h-screen flex flex-col md:flex-row">
        
        <!-- SIDEBAR -->
        <aside class="w-full md:w-64 bg-white border-r border-gray-200 flex flex-col sticky top-0 h-screen">
            <div class="p-8 text-center">
                <span class="text-2xl font-black text-indigo-800 italic uppercase tracking-tighter">GVA Gráfica</span>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <button onclick="mudarAba('loja', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100 active-aba">
                    <i class="fa fa-shopping-bag"></i> Loja PDV
                </button>
                <button onclick="mudarAba('producao', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100">
                    <i class="fa fa-print"></i> Produção
                </button>
                <button onclick="mudarAba('financeiro', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100">
                    <i class="fa fa-wallet"></i> Financeiro
                </button>
                <button onclick="mudarAba('cadastros', this)" class="aba-btn w-full flex items-center gap-3 p-4 rounded-xl font-bold text-gray-500 hover:bg-gray-100">
                    <i class="fa fa-database"></i> Cadastros
                </button>
            </nav>
            <div class="p-4 border-t">
                <button onclick="sair()" class="w-full text-red-500 font-black py-2 hover:bg-red-50 rounded-lg">Sair do Sistema</button>
            </div>
        </aside>

        <!-- CONTEUDO PRINCIPAL -->
        <main class="flex-1 p-8 overflow-y-auto">

            <!-- ABA: LOJA -->
            <section id="aba-loja" class="aba-content block">
                <div class="flex flex-col lg:flex-row gap-8">
                    <!-- Vitrine -->
                    <div class="flex-1">
                        <div id="menuFiltroCat" class="flex gap-2 mb-6 overflow-x-auto pb-2"></div>
                        <div id="gradeProdutos" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
                    </div>
                    <!-- Carrinho Fixado -->
                    <div class="w-full lg:w-80 bg-white p-6 rounded-2xl border shadow-sm h-fit sticky top-8">
                        <h3 class="text-xl font-black mb-6 flex items-center gap-2"><i class="fa fa-cart-shopping text-indigo-600"></i> Carrinho</h3>
                        <div id="listaCarrinho" class="space-y-4 mb-6 max-h-96 overflow-y-auto"></div>
                        <div class="border-t pt-4 space-y-2">
